@if (!hasPriceRange()) {
<!-- DISEÑO 1: Producto Estándar (Estilo Lista / Minimalista) -->

    </svg>
  </div>
  <!-- Contenido Derecho (Info) -->
  <div class="flex relative w-full items-end h-full mt-auto">
    <img
      [src]="product().imageUrl"
      class="w-auto object-contain max-h-[80%] md:max-h-[80%] h-full mx-auto z-10 px-8 pt-2 drop-shadow-xl drop-shadow-black"
      alt="{{ product().name }}"
    />

    @if (canOrder()) {
    <app-add-button
      text=""
      (clicked)="onAddClick($event)"
      customClass="w-12 h-12 md:w-8 md:h-8 absolute bottom-2 z-10 right-2 flex items-center  justify-center  "
    ></app-add-button>
    }
  </div>
</div>
} @else {
<!-- Layout 1 sin imagen -->
<div
  (click)="productClick.emit(product())"
  class="group relative py-6 px-4 min-h-40 md:px-6 transition-all duration-300 cursor-pointer hover:bg-secondary/5 flex items-start gap-6"
>
  <div class="grid grid-cols-4 items-center space-y-2 w-full">
    <div class="flex flex-col col-span-3 items-start justify-start gap-2">
      <h3
        class="text-3xl flex gap-4 text-white font-display text-primarytracking-tight group-hover:text-accent transition-colors"
      >
        {{ product().name }} @if (product().isRecommended) {
        <svg
          lucideStar
          class="w-8 h-8 drop-shadow-xs drop-shadow-amber-600 text-accent fill-accent"
        ></svg>
        }
      </h3>
      <p
        class="flex justify-start w-auto max-w-60 rounded-full px-4 py-2 items-center gap-4"
      >
        <span class="text-2xl font-display text-white tracking-tighter">
          {{ startingPrice() | precio }}
        </span>

      </p>
    </div>
    <div class="flex items-start h-full justify-end">
      @if (canOrder()) {
      <app-add-button
        text=""
        (clicked)="onAddClick($event)"
        iconSize="h-10 w-10 md:w-6 md:h-6"
        class="transform group-hover:scale-110 pt-2 transition-transform"
      ></app-add-button>
      }
    </div>
  </div>
</div>

} } @else {
<!-- DISEÑO 2: Producto con Rangos de Precio (Estilo Card Prominente) -->
<app-price-range-card
  [product]="product()"
  [startingPrice]="startingPrice()"
  [canOrder]="canOrder()"
  (productClick)="productClick.emit($event)"
  (addToCart)="addToCart.emit($event)"
/>
}

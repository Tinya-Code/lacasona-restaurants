<header
  class="relative font-body bg-secondary w-full max-h-140 h-[80svh]  bg-[url('/images/hero/banner-mobile.jpeg')] md:bg-[url('/images/hero/banner.png')] bg-cover md:bg-center border-b-8 border-primary mb-12 rounded-b-[100px] overflow-hidden">
  <div class="h-full px-6 py-12 ">
    <div
      class="h-full max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-2 items-center justify-center space-y-8 relative z-10">
      <div class="h-full flex flex-col justify-center">
        <div class="flex flex-col justify-center items-center gap-4">
          <!-- Logo Section -->
          <a href="/"
            class="bg-white h-60 w-60 flex justify-center items-center rounded-full outline-primary outline-4">
            <img src="/logo-lacasona.svg" [alt]="restaurantName()" class="w-64 h-full px-8 object-contain" />
          </a>
          <p
            class="text-center font-display text-primary-text/90 max-w-xs text-xl drop-shadow-secondary drop-shadow-[2px_2px_0px_rgba(0,0,0,0.5)]  ">
            El auténtico sabor para
            <span class="text-accent text-2xl font-display">compartir en familia</span>.
          </p>
        </div>

        <!-- Info Section -->
        <div
          class="text-center md:text-left pt-8 gap-4 col-span-2 items-center justify-end md:justify-center flex flex-col flex-1 md:flex-0 space-y-4">
          <div class="flex flex-wrap hidden w-full md:w-auto items-center justify-center gap-4">
            <!-- Address Section -->
            <div
              class="group flex items-center w-full gap-1 md:gap-3 px-3 py-2 rounded-full border-2 border-primary transition-colors duration-300">
              <!-- Badge del pin -->

              <svg lucideMapPin class="w-6 h-6 text-primary-text"></svg>

              <!-- Dirección -->
              <span class="md:text-lg text-sm font-semibold text-primary-text/90 tracking-tight max-w-[220px] truncate">
                {{ address() }}
              </span>

              <!-- Acciones -->
              <div class="flex items-center gap-1 border-l border-primary/20 pl-3 ml-1">
                <button (click)="copyAddress()" title="Copiar dirección"
                  class="flex items-center justify-center w-8 h-8 rounded-full text-primary-text/60 hover:text-primary hover:bg-primary/10 transition-all duration-200 active:scale-90">
                  <svg lucideCopy class="w-6 h-6"></svg>
                </button>
                <button (click)="openMaps()" title="Ver en Google Maps"
                  class="flex items-center justify-center w-8 h-8 rounded-full text-primary-text/60 hover:text-primary hover:bg-primary/10 transition-all duration-200 active:scale-90">
                  <svg lucideMap class="w-6 h-6"></svg>
                </button>
              </div>
            </div>
          </div>

          <!-- Action Section -->
          <div class="flex md:flex-col lg:flex-row justify-center items-center gap-4">
            <!-- Gallery Button -->

            <a href="/info-restaurante"
              class="group flex rounded-full bg-secondary/70 hover:border-transparent border-2 select-none active:bg-primary active:scale-95 duration-300 gap-2 px-8 py-3 border-primary/80 hover:bg-primary items-center">
              <svg lucideImages class="w-6 h-6 text-white group-hover:scale-110 transition-transform"></svg>

              <span class="md:text-lg text-sm text-white   font-display transition-colors">Galería</span>
            </a>
            <!-- Share Button -->

            <app-share-button />
          </div>
        </div>
      </div>
    </div>
  </div>
</header>

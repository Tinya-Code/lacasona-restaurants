<div
  class="group relative min-w-[250px] h-[400px] transition-all duration-300 overflow-hidden cursor-pointer active:scale-100 rounded-2xl border-2 border-transparent hover:border-2 hover:border-accent flex flex-col"
>
  <div
    [style.background-image]="'url(' + combo().image_url + ')'"
    class="w-full h-full bg-cover bg-center"
  >
    <div
      class="relative flex flex-col h-full gap-4 p-4 bg-linear-to-t from-black to-transparent"
    >
      <div class="flex-1"></div>
      <div class="flex flex-col gap-2">
        <div class="flex flex-col gap-1 mt-auto">
          <h3 class="text-xl font-display text-primary-text">
            {{ combo().name }}
          </h3>
          <p
            class="text-primary-text/70 max-w-xs font-body leading-relaxed line-clamp-3"
          >
            {{ combo().description }}
          </p>
        </div>

        <div class="flex gap-4">
          <p
            class="flex-1 rounded-sm tracking-widest font-display text-white text-xl"
          >
            {{ combo().price | precio }}
          </p>
          @if (canOrder()) {
          <app-add-button
            class="flex-1"
            customClass="w-full flex items-center justify-center border-px border-white active"
            (clicked)="addToCart.emit(combo())"
          ></app-add-button>
          }
        </div>
      </div>
    </div>
  </div>
</div>

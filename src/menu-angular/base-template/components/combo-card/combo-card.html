<div
  class="group relative w-sm  transition-all duration-300 overflow-hidden cursor-pointer active:scale-100 rounded-2xl border-2 border-transparent hover:border-2 hover:border-accent flex flex-col">

  
   
    <div class="h-76 relative">
      <img [src]="combo().image_url" [alt]="combo().name" class="w-full h-full object-contain" />
            
      @if (canOrder()) {
        <app-add-button 
          customClass="flex absolute bottom-0 right-4 items-center justify-center border-px border-white active"
          (clicked)="addToCart.emit(combo())"></app-add-button>
        }
    </div>
    <div class="flex flex-col gap-2 p-4">
      <div class="flex flex-col gap-1 mt-auto">
        <h3 class="text-2xl flex w-full justify-between items-center font-display text-primary-text">
          {{ combo().name }}
                  <span class="rounded-sm tracking-widest font-display text-tertiary text-3xl">
          {{ combo().price | precio }}
        </span>
        </h3>
        <p class="text-primary-text/80 max-w-xs font-body leading-relaxed line-clamp-3">
          {{ combo().description }}
        </p>
      </div>

      <div class="flex gap-4">


      </div>
    </div>

</div>
